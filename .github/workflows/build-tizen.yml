name: Build TeX Tizen

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'tizen/**'
      - '.github/workflows/build-tizen.yml'

permissions:
  contents: write

env:
  TIZEN_STUDIO_VER: '5.5'
  PROFILE_NAME: 'TeX'
  CERT_NAME: 'texCert'
  CERT_PASSWORD: '1234'
  DIST_SIGNER_PASSWORD: 'tizenpkcs12passfordsigner'
  TEX_REPO: 'https://github.com/OGHaza/TeX.git'
  TEX_REF: 'main'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout this repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Setup Node.js — needed for building TeX (Angular) and for the
      #    version-extraction step.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install required apt packages
      - name: Install required packages
        run: sudo apt-get update && sudo apt-get install -y expect imagemagick

      # 4. Download Tizen Studio
      - name: Download Tizen Studio ${{ env.TIZEN_STUDIO_VER }}
        run: |
          curl -L -o tizen-installer \
            "https://download.tizen.org/sdk/Installer/tizen-studio_${TIZEN_STUDIO_VER}/web-cli_Tizen_Studio_${TIZEN_STUDIO_VER}_ubuntu-64.bin"

      # 5. Install Tizen Studio
      - name: Install Tizen Studio
        run: |
          chmod +x tizen-installer
          ./tizen-installer --accept-license "${GITHUB_WORKSPACE}/tizen-studio"
          rm ./tizen-installer

      # 6. Create signing certificate + security profile
      - name: Create Tizen certificate and profile
        run: |
          TIZEN="${GITHUB_WORKSPACE}/tizen-studio/tools/ide/bin/tizen"
          "$TIZEN" certificate \
            -a "$PROFILE_NAME" \
            -p "$CERT_PASSWORD" \
            -c US -s NA -ct NA -o TeX \
            -n TeXTizen \
            -e tex@example.org \
            -f "$CERT_NAME"
          "$TIZEN" security-profiles add \
            -n "$PROFILE_NAME" \
            -a "${GITHUB_WORKSPACE}/tizen-studio-data/keystore/author/${CERT_NAME}.p12" \
            -p "$CERT_PASSWORD"
          "$TIZEN" cli-config "profiles.path=${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml"

      # 7. Run our build (prepare + tizen build-web only — packaging is
      #    interactive and is done by the expect script in the next step).
      #    build.sh clones TeX, runs `npm ci && npm run build`, then wraps
      #    the resulting dist/ in our Tizen layout.
      - name: Run build.sh --no-package
        env:
          TIZEN_BIN: ${{ github.workspace }}/tizen-studio/tools/ide/bin/tizen
          TIZEN_PROFILE: ${{ env.PROFILE_NAME }}
          TEX_REPO: ${{ env.TEX_REPO }}
          TEX_REF: ${{ env.TEX_REF }}
        run: bash tizen/build.sh --no-package

      # 8. Inline the cert passwords into profiles.xml so the expect
      #    script only has to confirm them. (The CLI prompts for them
      #    interactively otherwise.)
      - name: Prepare profiles.xml for unattended signing
        run: |
          PROFILES_XML="${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml"
          sed -i "s|${GITHUB_WORKSPACE}/tizen-studio-data/keystore/author/${CERT_NAME}.pwd|${CERT_PASSWORD}|g" "$PROFILES_XML"
          sed -i "s|${GITHUB_WORKSPACE}/tizen-studio-data/tools/certificate-generator/certificates/distributor/tizen-distributor-signer.pwd|${DIST_SIGNER_PASSWORD}|g" "$PROFILES_XML"
          sed -i 's|password=""|password="'"${DIST_SIGNER_PASSWORD}"'"|g' "$PROFILES_XML"

      # 9. expect-driven `tizen package` (it still prompts; expect feeds it)
      - name: Package WGT (expect-driven)
        env:
          TIZEN_BIN: ${{ github.workspace }}/tizen-studio/tools/ide/bin/tizen
          BUILD_DIR: ${{ github.workspace }}/build
        run: |
          cat > package.exp << 'EOF'
          #!/usr/bin/expect -f
          set timeout 300
          spawn $env(TIZEN_BIN) package -t wgt -s $env(PROFILE_NAME) -- $env(BUILD_DIR)/.buildResult
          expect {
            "Author password:"          { send "$env(CERT_PASSWORD)\r"; exp_continue }
            "Save author password"      { send "n\r"; exp_continue }
            "Distributor1 password:"    { send "$env(DIST_SIGNER_PASSWORD)\r"; exp_continue }
            "Save distributor1 password" { send "n\r"; exp_continue }
            eof
          }
          catch wait result
          set exit_code [lindex $result 3]
          exit $exit_code
          EOF
          chmod +x package.exp
          PROFILE_NAME="$PROFILE_NAME" \
          CERT_PASSWORD="$CERT_PASSWORD" \
          DIST_SIGNER_PASSWORD="$DIST_SIGNER_PASSWORD" \
            ./package.exp

      # 10. Stage the artifact under release/
      - name: Move .wgt to release/
        run: |
          mkdir -p release
          WGT=$(find "${GITHUB_WORKSPACE}/build/.buildResult" -maxdepth 1 -name '*.wgt' -print -quit)
          if [ -z "$WGT" ]; then
            echo "::error::tizen package did not produce a .wgt"
            ls -la "${GITHUB_WORKSPACE}/build/.buildResult" || true
            exit 1
          fi
          mv "$WGT" release/TeX-Tizen.wgt
          ls -la release/

      # 11. Always upload the artifact (downloadable from the workflow run page)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TeX-Tizen-wgt
          path: release/TeX-Tizen.wgt
          if-no-files-found: error

      # 12. Compute version + timestamp for the release tag
      - name: Compute release tag
        id: tag
        run: |
          # Pull TeX's upstream package.json version (the wrapper has no
          # version of its own — the .wgt's version comes from upstream).
          VERSION=$(node -p "require('./tex-src/package.json').version" 2>/dev/null || echo "0.0.0")
          DATE=$(date +'%Y-%m-%d-%H%M')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "date_tag=${DATE}"   >> "$GITHUB_OUTPUT"
          echo "date_pretty=$(date +'%Y-%m-%d %H:%M')" >> "$GITHUB_OUTPUT"

      # 13. Publish a Release.
      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: 'tex-tizen-v${{ steps.tag.outputs.version }}-${{ steps.tag.outputs.date_tag }}'
          name: 'TeX Tizen v${{ steps.tag.outputs.version }} (${{ steps.tag.outputs.date_pretty }})'
          files: |
            release/TeX-Tizen.wgt
            tools/debug-server.py
          body: |
            ## Kodi on your Samsung TV, with hardware video

            Built ${{ steps.tag.outputs.date_pretty }} from TeX ${{ steps.tag.outputs.version }}.

            Wraps [TeX](https://github.com/OGHaza/TeX), the modern
            Angular-based Kodi web UI, into a sideloadable Samsung
            Tizen `.wgt` and quietly hijacks the video pipeline so
            playback goes through **Tizen's hardware AVPlay decoder**
            instead of the Kodi server's own screen. Your library,
            your remote, hardware HEVC / AC3 / EAC3 decode, no extra
            hardware.

            ### What's in here

            - **One-time setup.** Enter host, port, Kodi credentials,
              press Connect. The wrapper pings Kodi up-front so wrong
              creds fail fast — no blank loading screens.
            - **Auth everywhere.** XHR, fetch, WebSocket and `<img src>`
              loads all get HTTP Basic auth injected automatically.
              The wrapper knows nothing about TeX internals — it
              patches at the network layer.
            - **Hardware video playback.** `Player.Open` JSON-RPC calls
              are intercepted at the wire; the file path is resolved via
              `Files.PrepareDownload` and handed to `webapis.avplay`
              with userinfo-embedded auth.
            - **Audio "now playing" card** for music files (AVPlay's
              video plane is empty for audio-only, otherwise you'd just
              see black).
            - **Virtual mouse cursor** with acceleration on held arrow
              keys — Tizen 5 ships no spatial navigation for web apps,
              so we render our own pointer and dispatch real mouse
              events at it.
            - **Live debug stream.** Optional WebSocket sink
              (`debug-server.py`, stdlib-only Python, attached below)
              prints every `console.*`, uncaught exception, click, and
              XHR response with timestamps. Indispensable on a device
              with no DevTools.

            ### Surviving Chromium 56

            Tizen 5.0 ships **Chromium 56** (early 2017). Angular 16
            emits **ES2020+**. This build makes them coexist via:

            - `esbuild --target=chrome56` over every built JS file —
              lowers optional chaining, nullish coalescing, class
              fields, static blocks to ES5-equivalents
            - Hand-rolled non-enumerable polyfills for `globalThis`,
              `queueMicrotask`, `Array.flat`/`flatMap`, `Object.fromEntries`
            - WebSocket + XHR URL fixups for the broken `file://`-derived
              URLs that upstream code emits on a `.wgt` origin

            ### Install

            1. Enable Developer Mode on the TV
               ([Samsung instructions](https://developer.samsung.com/smarttv/develop/getting-started/using-sdk/tv-device.html)).
            2. Sideload `TeX-Tizen.wgt` via
               [Apps2Samsung](https://apps2samsung.madebypatrick.nl/)
               (the friendly path), Tizen Studio's Device Manager, or
               `sdb install`.
            3. Launch, enter Kodi host / port / username / password,
               press Connect. Every subsequent launch goes straight
               into TeX.

            ### Requirements

            - Samsung TV with **Tizen 5.0 or later** (~2019 RU-series
              and newer)
            - Kodi v17+ on the LAN, with the HTTP web interface enabled
              and Basic auth credentials set

            ### Known limits

            The wrapper can't expose what Kodi's JSON-RPC API doesn't:

            - Kodi addons (`plugin://` URIs — resolved server-side
              inside Kodi's Python interpreter; no playable stream
              ever leaves)
            - PVR / Live TV backends
            - DRM-protected content
            - Casting / DLNA out to other devices

            If you need any of those, run Jellyfin + [jellyfin-tizen](https://github.com/jellyfin/jellyfin-tizen)
            instead.

            ### Files

            - **`TeX-Tizen.wgt`** — the app, signed and ready to sideload
            - **`debug-server.py`** — optional live debug log sink, any
              machine with Python 3

            ### Build details
            - TeX base: ${{ steps.tag.outputs.version }}
            - Commit: ${{ github.sha }}
          draft: false
          prerelease: false
